<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>MyLibrary</h1>
    <button class="new-btn">New Book</button>
    <table>
      <thead>
        <tr>
          <th>Book Name</th>
          <th>Author</th>
          <th>Number of pages</th>
          <th>Status(read or not yet)</th>
        </tr>
      </thead>
      <tbody class="books">
        <tr>
          <td>The Hobbit</td>
          <td>J.R.R. Tolkien</td>
          <td>295</td>
          <td>not read yet</td>
        </tr>
      </tbody>
    </table>
  </div>
  <script src="script.js"></script>
</body>

</html>
